iterationPrompt: |
  你现在处于 ArkWeb 代码修复迭代阶段：

  1. 分析评审中发现的问题（内存安全、编译宏遗漏、代码风格）
  2. 定位问题根因
  3. 最小化修复，不扩大修改范围
  4. 验证修复后编译通过、测试通过
  5. 确认向后兼容性不变

  修复原则：
  - 只修改必要的部分
  - 保持 BUILDFLAG(ARKWEB_MEDIA) 编译宏保护完整
  - 不引入新的文件修改
