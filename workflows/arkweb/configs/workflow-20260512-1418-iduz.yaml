workflow:
  name: ArkWeb Video全屏Title控制0512
  description: ArkWeb Blink 层 <video> 全屏 Title 控制功能：在 controlsList 属性中新增
    nofullscreentitle token，允许开发者控制全屏播放时是否显示 document.title。基于 arkweb-sdd v5.1
    Phase 1-7 全流程（不含 Committer 检视和 PR 提交）。0512 版：补全全部 Skill 绑定。
  mode: state-machine
  states:
    - name: 需求澄清
      description: 对初始需求进行澄清、结构化和质疑，产出 proposal.md 作为后续阶段的输入基线。
      type: normal
      requireHumanApproval: true
      steps:
        - id: p1-step1
          name: 需求澄清与结构化
          agent: arkweb-architect
          task: >-
            基于用户提供的初始需求描述，进行需求澄清和结构化，输出 proposal.md：

            1. 梳理功能目标：明确要解决的问题（全屏时控制 HTML title
            显示）和技术背景（MediaControlEnteredFullscreenTitleDisplayElement 组件）

            2. 识别关键场景与验收标准（沉浸式全屏、默认行为不变、HTML 扩展属性设置后隐藏 title、可见性切换）

            3. 明确 NonGoals：不修改 web_webview/arkui_ace_engine、不产出 XTS

            4. 明确约束：仅 Blink 渲染层、in-place 模式

            5. 列出待澄清问题和假设

            6. 输出 proposal.md
          role: defender
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
          skills:
            - aceharness-spec-coding
            - arkweb-brainstorm
        - id: p1-step2
          name: 需求攻击
          agent: arkweb-design-breaker
          task: |-
            攻击 proposal.md，重点检查：
            1. 需求描述是否有歧义或遗漏
            2. 验收标准是否可量化、可测试
            3. 是否遗漏边界场景（如全屏退出再进入、多视频元素同时存在、动态属性变更）
            4. HTML 扩展属性方案是否合理，与现有 Web 标准的兼容性
            5. 目标用户诉求是否被充分覆盖
          role: attacker
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
          skills:
            - arkweb-brainstorm
        - id: p1-step3
          name: 需求评审裁决
          agent: arkweb-design-judge
          task: |-
            评审 architect 的 proposal 和 design-breaker 的攻击发现，输出裁决：
            {"verdict":"pass|conditional_pass|fail","summary":"..."}
            重点关注：需求完整性、验收标准可测试性、待澄清问题是否已解决
          role: judge
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
          skills:
            - arkweb-spec-review
      transitions:
        - to: 需求分析
          condition:
            verdict: pass
          priority: 1
          label: 需求澄清通过
        - to: 需求澄清
          condition:
            verdict: conditional_pass
          priority: 2
          label: 需继续澄清
        - to: 终止
          condition:
            verdict: fail
          priority: 3
          label: 需求不可行
      isInitial: true
      isFinal: false
      maxSelfTransitions: 3
    - name: 需求分析
      description: 基于已确认的需求，深入分析代码现状、技术可行性和实现路径。产出：技术可行性分析报告。
      type: normal
      requireHumanApproval: true
      steps:
        - id: p2-step1
          name: 代码现状分析
          agent: arkweb-architect
          task: |-
            基于已确认的需求基线，分析代码现状和实现路径：
            1. 分析 keywords.json5 的 controlslist attribute 区域结构和新增位置
            2. 分析 HTMLMediaElementControlsList 的 ValidateTokenValue、ShouldHide*、CanShowAllControls 方法链
            3. 分析 MediaControlsImplUtils 中 OnEnteredFullscreenSetIswanted、MakeOpaqueExt、MakeTransparentExt、HideExt 的调用链
            4. 分析 controlsList 获取路径：MediaElement().controlsList() 在各上下文中的可用性
            5. 分析 BUILDFLAG(ARKWEB_MEDIA) 编译宏的影响范围
            6. 输出技术可行性分析报告
          role: defender
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
          skills:
            - arkweb-brainstorm
            - arkweb-code-analysis
        - id: p2-step2
          name: 技术方案攻击
          agent: arkweb-design-breaker
          task: |-
            攻击技术可行性分析，重点检查：
            1. controlsList 获取路径是否存在空指针风险
            2. ParserAppendChild 条件跳过是否影响 panel DOM 结构完整性
            3. ShouldHideFullscreenTitle() 在全屏和非全屏上下文中的调用安全性
            4. 与已有 ShouldHide* 方法的风格一致性
            5. 编译宏保护是否需要在 ArkWeb 扩展文件中使用
          role: attacker
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
          skills:
            - arkweb-brainstorm
        - id: p2-step3
          name: 需求分析评审
          agent: arkweb-design-judge
          task: |-
            评审技术可行性分析和攻击发现，输出裁决：
            {"verdict":"pass|conditional_pass|fail","summary":"..."}
            重点关注：代码路径安全性、修改范围最小化、与现有架构的一致性
          role: judge
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
          skills:
            - arkweb-spec-review
      transitions:
        - to: 设计文档
          condition:
            verdict: pass
          priority: 1
          label: 分析通过
        - to: 需求分析
          condition:
            verdict: conditional_pass
          priority: 2
          label: 补充分析
        - to: 终止
          condition:
            verdict: fail
          priority: 3
          label: 技术不可行
      isInitial: false
      isFinal: false
      maxSelfTransitions: 3
    - name: 设计文档
      description: 基于需求分析产出架构设计文档和功能设计文档。产出：design.md。
      type: normal
      requireHumanApproval: true
      steps:
        - id: p3-step1
          name: 编写设计文档
          agent: arkweb-architect
          task: |-
            基于已确认的需求分析，编写详细设计文档：
            1. 架构设计：三层 token 通道（关键字注册层→Token 管理层→行为控制层）
            2. 组件 1：keywords.json5 新增 nofullscreentitle 关键字
            3. 组件 2：HTMLMediaElementControlsList 新增 ValidateTokenValue 校验 + ShouldHideFullscreenTitle() 查询 + CanShowAllControls() 聚合
            4. 组件 3：MediaControlsImplUtils 修改 OnEnteredFullscreenSetIswanted、MakeOpaqueExt、MakeTransparentExt、HideExt
            5. 接口契约：ShouldHideFullscreenTitle() 前置条件、返回值语义
            6. 文件修改清单
            7. 数据模型：无新增，复用 DOMTokenList
            8. 假设和待确认项
          role: defender
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
              - design
          skills:
            - arkweb-design-doc
        - id: p3-step2
          name: 设计攻击
          agent: arkweb-design-breaker
          task: |-
            攻击设计方案，重点检查：
            1. controlsList token 注册是否有遗漏（是否需要修改 IDL 文件或其他注册点）
            2. ShouldHideFullscreenTitle 的调用时机是否覆盖所有全屏场景
            3. 与现有 nofullscreen token 的交互逻辑是否正确
            4. BUILDFLAG(ARKWEB_MEDIA) 编译宏保护是否完整
            5. 边界条件：空 controlsList、无效 token 组合、动态属性变更、全屏退出再进入
            6. 向后兼容性：未设置 nofullscreentitle 时所有路径行为不变
          role: attacker
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
              - design
          skills:
            - arkweb-brainstorm
        - id: p3-step3
          name: 设计评审裁决
          agent: arkweb-design-judge
          task: |-
            评审 architect 的设计文档和 design-breaker 的攻击发现，输出裁决：
            {"verdict":"pass|conditional_pass|fail","summary":"..."}
            重点关注：架构合理性、修改范围最小化、向后兼容性、接口契约完整性
          role: judge
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
              - design
          skills:
            - arkweb-spec-review
      transitions:
        - to: 文档评审
          condition:
            verdict: pass
          priority: 1
          label: 设计通过
        - to: 设计文档
          condition:
            verdict: conditional_pass
          priority: 2
          label: 需修复设计
        - to: 终止
          condition:
            verdict: fail
          priority: 3
          label: 设计不可行
      isInitial: false
      isFinal: false
      maxSelfTransitions: 3
    - name: 文档评审
      description: 评审需求文档和设计文档的一致性、完整性和可执行性。产出：评审通过的设计基线。
      type: normal
      requireHumanApproval: true
      steps:
        - id: p4-step1
          name: 文档一致性评审
          agent: arkweb-design-judge
          task: |-
            对需求文档和设计文档进行整体评审：
            1. 需求→设计的追溯完整性：每项需求是否都有对应设计组件
            2. 设计→任务的映射完整性：每个设计组件是否都有对应 task
            3. 验收标准可测试性：每个验收标准是否都能通过单元测试或构建验证覆盖
            4. 文件修改清单完整性：是否遗漏需要修改的文件
            5. 输出评审报告
          role: judge
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
              - design
              - tasks
          skills:
            - arkweb-spec-review
        - id: p4-step2
          name: 文档攻击
          agent: arkweb-design-breaker
          task: |-
            攻击文档基线，重点检查：
            1. 需求与 design.md 组件的映射是否存在遗漏
            2. tasks.md 中任务的依赖链是否完整
            3. 测试策略是否覆盖所有验收标准
            4. 构建验证命令是否与实际仓库环境匹配
          role: attacker
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
              - design
              - tasks
          skills:
            - arkweb-brainstorm
      transitions:
        - to: 规格生成
          condition:
            verdict: pass
          priority: 1
          label: 文档评审通过
        - to: 设计文档
          condition:
            verdict: conditional_pass
          priority: 2
          label: 文档需修改
        - to: 终止
          condition:
            verdict: fail
          priority: 3
          label: 文档不可接受
      isInitial: false
      isFinal: false
      maxSelfTransitions: 3
    - name: 规格生成
      description: 从设计文档提取结构化 Spec（接口定义、行为场景、约束条件），生成 spec.md 和 execution-plan.md（AC→Task 映射、验证命令）。
      type: normal
      requireHumanApproval: true
      steps:
        - id: p5-step1
          name: 生成结构化 Spec
          agent: arkweb-architect
          task: >-
            从已确认的设计文档提取结构化规格：

            1. 接口定义：ShouldHideFullscreenTitle() 签名、返回值、前置条件

            2. 行为场景：controlsList 包含 nofullscreentitle + 全屏→title 不显示；不包含→title
            显示；组合 token→各 token 独立生效；全屏切换→title 始终不显示

            3. 约束条件：仅 Blink 层、沿用 DOMTokenList、默认行为不变

            4. 测试规格：测试用例的预期行为

            5. 输出 spec.md
          role: defender
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - design
              - spec
              - tasks
          skills:
            - arkweb-spec-gen
        - id: p5-step2
          name: 生成执行计划
          agent: arkweb-architect
          task: >-
            基于已确认的 spec.md，生成可执行的任务计划 execution-plan.md：

            1. 引用 approved spec.md 中的接口定义和行为场景

            2. 将每个验收标准（AC）映射到具体 Task，标注文件范围、AC 映射、前置依赖

            3. 划分阶段计划：首批实现边界、可后置项

            4. 每个 Task 必须包含：完成判据、验证命令，禁止 TBD/TODO 占位符

            5. 输出 execution-plan.md 到 projectRoot
          role: defender
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - design
              - spec
              - tasks
          skills:
            - arkweb-design-doc
      transitions:
        - to: 终止
          condition:
            verdict: fail
          priority: 1
          label: Spec 不可行
      isInitial: false
      isFinal: true
      maxSelfTransitions: 3
    - name: 终止
      description: 异常终止，记录已完成的产出物和未完成项。
      type: normal
      requireHumanApproval: false
      steps:
        - id: terminal-step1
          name: 终止记录
          agent: arkweb-doc-writer
          task: 记录工作流终止原因、已完成的阶段产出物和未完成项清单
          role: defender
          specTaskBinding:
            taskId: "1.1"
            taskIds:
              - "1.1"
              - "1.2"
            requirementIds:
              - "1"
            artifactKeys:
              - requirements
              - design
              - tasks
          skills:
            - aceharness-spec-coding
      transitions: []
      isInitial: false
      isFinal: true
      maxSelfTransitions: 3
  maxTransitions: 30
  supervisor:
    enabled: true
    agent: default-supervisor
    stageReviewEnabled: true
    checkpointAdviceEnabled: true
    scoringEnabled: true
    experienceEnabled: true
context:
  projectRoot: /root/.aceharness/workspaces/arkweb-video-fullscreen-title-0512
  workspaceMode: in-place
  requirements: >-
    在 ArkWeb（OpenHarmony-TPC/chromium_src 仓）中，当 <video> 元素播放并点击全屏时，默认会在全屏画面顶部显示
    HTML 页面标题（document.title）。这个行为是通过 Chromium Blink 层的
    MediaControlEnteredFullscreenTitleDisplayElement 组件实现的。


    允许开发者通过一个 HTML 扩展属性来控制全屏时是否显示 HTML title。当开发者设置该属性后，全屏播放时不再显示 title。原默认行为（显示
    title）不变。
  timeoutMinutes: 180
