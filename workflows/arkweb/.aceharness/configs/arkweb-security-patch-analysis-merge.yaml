workflow:
  name: ArkWeb 本地 Issue 分析归档与上游安全补丁自动合入
  description: 面向本地 issue HTML/MHTML 归档，串联漏洞解析、Patch抓取、影响判定、分析归档、自动合入、编译验证、提交上库与最终归档的单一工作流
  mode: state-machine
  states:
    - name: 漏洞解析
      description: 从本地 issue HTML/MHTML 归档中提取 issue、漏洞和上游修复线索
      type: normal
      requireHumanApproval: false
      steps:
        - name: 解析本地 issue 归档
          agent: arkweb-security-patch-issue-analyzer
          task: >
            基于 context.requirements 中规定的本地 issue 归档目录解析 issue 信息，目录示例使用
            <issue_archive_dir>。

            需要支持 .html、.htm、.mhtml、.mht 文件；如果目录里有
            issue.zip，可在只读分析需要时查看压缩包目录或解压到临时目录。


            解析要求：

            1. 扫描归档目录，列出候选 issue 文件，优先处理文件名或正文中包含 Chromium issue
            id、Merge、M144、CVE、安全修复、CL、commit、patch 等线索的文件；

            2. 从文件名和 HTML/MHTML 正文中提取 issue 标题、issue
            id、产品/里程碑、状态、标签、owner、reporter、时间、相关链接；

            3. 识别正文中的修复线索，包括 Chromium bug、Gerrit CL、commit hash、Gitiles
            链接、review 链接、PR 链接、Change-Id、Fixed/merged/reland/revert 关系；

            4. 按 arkweb-security-patch-intake skill
            的修复链接抽取规则，逐条审查评论中的代码链接，区分真正的上游修复 PR/CL 与 bisect/culprit/noise 链接；

            5. 漏洞解析阶段必须获取或定位上游修复 PR/CL，并同时填充到 Markdown 和 JSON；

            6. 输出每个候选 issue 的可信度、信息缺口、是否可继续自动抓取 patch；

            7. 每个 issue 从本阶段开始就写入独立归档目录：
               .ace-outputs/{runId}/{issue_id}/01_issue_analysis.md
               .ace-outputs/{runId}/{issue_id}/01_issue_analysis.json
            8. 不得在 .ace-outputs/{runId}/ 根目录写任何文件；不得生成根级索引或根级
            01_issue_analysis.md/json。
               后续阶段必须通过扫描 .ace-outputs/{runId}/{issue_id}/01_issue_analysis.json 发现待处理 issue。

            所有阶段产物的唯一输出根目录是：
              <context.projectRoot>/.ace-outputs/{runId}
              真实 ArkWeb 源码根目录来自 <context.codebase>，context.projectRoot 只作为工作流轻量输出根，避免 ACEHarness 启动时对 ArkWeb 大仓建立 Git 基线。
            不得写入 ~/.aceharness/runs/{runId}/outputs/.ace-outputs，也不得写入任意临时
            .ace-outputs。


            处理本地 HTML/MHTML 时，优先使用结构化文本抽取；可用 `python3`
            标准库、`grep`、`sed`、`strings` 等只读命令提取可读正文和链接，

            不要修改归档目录中的原始文件。

            优先直接执行 skill 内置脚本，不要实时生成临时解析脚本：
              python3 skills/arkweb-security-patch-intake/scripts/parse_local_issue_archive.py --archive-dir <本地issue归档目录> --project-root <context.codebase> --output-root <context.projectRoot>/.ace-outputs/{runId}
            脚本产物必须再按 arkweb-security-patch-intake skill 的修复链接规则做语义复核；脚本无法确认的
            review/blocked 项可人工补充，但不得臆造修复链接。


            阶段边界：

            - 本阶段负责 Issue 基础字段、原始描述、修复事件审计、upstream_fix_prs[] 和初步问题/修复摘要；

            - 不负责修改文件列表、patch 本地归档、ArkWeb 影响结论、责任田、特性树、是否建议保留。
          role: defender
          skills:
            - arkweb-security-patch-intake
        - name: 漏洞解析裁决
          agent: arkweb-security-patch-judge
          task: >
            审核各 issue 目录中的《01_issue_analysis.md》是否足以支撑本地 issue 到上游 patch
            的自动获取；不得依赖根目录索引。


            裁决要求：

            1. 至少有一个 issue 具备明确修复线索或可追踪的上游链接时，进入「Patch抓取」；

            2. issue 文件可读但线索不足时，给 conditional_pass 并回到「漏洞解析」继续补充；

            3. 本地归档不可读、没有有效 issue，或所有线索都无法追踪时，给 fail 并进入「分析归档」。


            在回复末尾输出 JSON：

            ```json

            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "Patch抓取|漏洞解析|分析归档",
              "issues": [
                {
                  "type": "security|implementation|design",
                  "severity": "critical|major|minor",
                  "description": "..."
                }
              ],
              "summary": "一句话总结"
            }

            ```
          role: judge
          skills:
            - arkweb-security-patch-judge
      transitions:
        - to: Patch抓取
          condition:
            verdict: pass
          priority: 1
          label: 本地 issue 线索可追踪
        - to: 漏洞解析
          condition:
            verdict: conditional_pass
          priority: 2
          label: 继续补充本地 issue 信息
        - to: 分析归档
          condition:
            verdict: fail
          priority: 3
          label: 无法解析有效 issue
      position:
        x: 80
        y: 160
      isInitial: true
      isFinal: false
      maxSelfTransitions: 3
    - name: Patch抓取
      description: 根据本地 issue 解析结果自动获取上游主修复 patch
      type: normal
      requireHumanApproval: false
      steps:
        - name: 自动获取修复 patch
          agent: arkweb-security-patch-fetcher
          task: |
            基于 {issue_id}/01_issue_analysis.md/json 和本地 issue HTML/MHTML 中提取到的链接，自动获取明确的上游主修复 patch，
            并写入对应 issue 目录下的 02_patch_fetch.md 和 02_patch_fetch.json。

            抓取规则：
            1. 只使用 {issue_id}/01_issue_analysis.json 中的 upstream_fix_prs[] 作为抓取入口；
            2. 若 issue 指向多个 CL，必须区分主修复、依赖、revert、reland、测试-only 改动，只把当前 issue 的主修复作为结果；
            3. 对每个确认 patch 输出来源 URL、commit hash/Change-Id、subject、author、reviewer、bug id、受影响文件、patch 文件路径或可复现获取命令；
            4. 根据 PR/CL 获取修改文件列表，写入 modified_files[]；
            5. patch 文件只归档到 .ace-outputs/{runId}/{issue_id}/patches/，不得在 .ace-outputs/{runId}/patches/ 下另建一份；
            6. 如果允许网络访问，可按链接获取 patch；如果网络不可用，必须输出可复现的获取命令和阻塞原因；
            7. 不得把“标题相似、同目录、同作者”的其他 patch 当作主修复。
            8. 优先直接执行 skill 内置脚本，不要实时生成临时抓取脚本：
               python3 skills/arkweb-security-patch-fetch/scripts/fetch_chromium_patch.py --project-root <context.codebase> --output-root <context.projectRoot>/.ace-outputs/{runId}
               如网络不可用，使用 --offline 生成可复现抓取命令和阻塞说明；不得改用相似候选 patch 顶替。

            阶段边界：
            - 本阶段负责 selected_fix、modified_files[]、patch_files[]、fetch_commands[]、excluded_candidates[]；
            - 不负责重写 Issue 基础字段、ArkWeb 影响结论、责任田、特性树、是否建议保留。
          role: defender
          skills:
            - arkweb-security-patch-fetch
        - name: Patch抓取裁决
          agent: arkweb-security-patch-judge
          task: >
            审核各 issue 目录中的《02_patch_fetch.md》和《02_patch_fetch.json》是否已经拿到或明确定位本地
            issue 对应的主修复 patch。

            必须实际检查 patch_files[] 指向的本地文件内容，不能只看路径是否存在或文件大小是否非零。


            裁决规则：

            1. patch 来源明确，且至少一个本地 patch/diff 文件通过内容校验时，进入「影响判定」；

            2. 仍有可补充的链接、CL 或 commit 线索时，给 conditional_pass 并回到「Patch抓取」；

            3. 无公开 patch、patch 无法确认、只有不可信候选，或 patch_files[] 中的本地 patch 实际是
            HTML/JSON/错误页/空文件而不是标准 diff 时，给 fail 并进入「分析归档」。


            本地 patch 内容校验要求：

            - 对每个 patch_files[] 中后缀为 .patch/.diff 的文件执行只读检查，确认文件存在、非空，且内容包含标准
            diff 信号之一：`diff --git`、`Index:`、`--- a/` + `+++ b/`、或 mbox patch 的
            `From <hash>` + `Subject:` + diff hunks；

            - 如果文件开头是 `<!DOCTYPE html>`、`<html`、`)]}'` JSON 响应、HTTP
            错误、Gerrit/Gitiles 错误页、纯 metadata JSON，不能算作有效 patch；

            - metadata JSON 只能作为 commit/文件列表辅助证据，不能替代标准 patch/diff 文件；

            - 裁决报告必须列出实际检查过的 patch 文件、判定为 valid/invalid 的原因，以及无效文件的前几行特征。

            可优先执行 skill 内置校验脚本复查 patch 内容：
              python3 skills/arkweb-security-patch-fetch/scripts/validate_patch_files.py --project-root <context.codebase> --output-root <context.projectRoot>/.ace-outputs/{runId}

            在回复末尾输出 JSON：

            ```json

            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "影响判定|Patch抓取|分析归档",
              "issues": [
                {
                  "type": "implementation|security|design",
                  "severity": "critical|major|minor",
                  "description": "..."
                }
              ],
              "summary": "一句话总结"
            }

            ```
          role: judge
          skills:
            - arkweb-security-patch-judge
      transitions:
        - to: 影响判定
          condition:
            verdict: pass
          priority: 1
          label: patch 已定位
        - to: Patch抓取
          condition:
            verdict: conditional_pass
          priority: 2
          label: 继续补抓 patch
        - to: 分析归档
          condition:
            verdict: fail
          priority: 3
          label: patch 不可用
      position:
        x: 500
        y: 160
      isInitial: false
      isFinal: false
      maxSelfTransitions: 3
    - name: 影响判定
      description: 判断已抓取 patch 对 ArkWeb / Chromium 基线的影响，不执行合入
      type: normal
      requireHumanApproval: false
      steps:
        - name: 分析 patch 影响
          agent: arkweb-security-patch-impact-decider
          task: |
            基于 {issue_id}/01_issue_analysis.md/json 和 02_patch_fetch.md/json，判断本地 issue 对应修复 patch 对当前 ArkWeb / Chromium 基线是否有影响，
            并写入对应 issue 目录下的 03_impact_decision.md 和 03_impact_decision.json。

            本工作流的本地 ArkWeb 仓库路径由 context.codebase 提供；context.projectRoot 只作为轻量输出根。
            影响判定阶段必须优先使用当前 workflow context 中的 context.codebase 作为源码核验路径；
            context.automation.repoPath 和 context.codebase 仅作为旧配置兼容字段，不要求用户填写，也不得因为它们为空而判定“未配置本地仓库路径”。

            必须包含：
            1. patch 涉及的上游目录、文件、组件和行为；
            2. Chromium 上游影响版本结论：明确列出该漏洞/修复影响哪些 Chromium milestone、分支或版本范围，无法精确到版本时必须说明 unknown；
            3. Chromium 版本结论依据：引用 issue 元数据、merge/milestone 标签、修复 CL/commit、branch-head、release note、提交时间或 patch 所在分支等证据，区分事实、推断和缺口；
            4. 再结合当前 workflow context 中的 context.codebase，对当前 ArkWeb 工程代码做本地核验：检查对应文件/符号/调用链/编译开关/平台裁剪是否存在，判断当前工程是否受影响；
            5. 明确 ArkWeb 当前工程真实影响结论：affected、unaffected、unknown 三选一，并说明它与 Chromium 版本影响范围之间的关系；同时必须读取 Web 页面需求描述 context.requirements 中的“是否强制合入：是/否”标志，写入 merge_policy.force_merge、merge_policy.impact_mode、merge_policy.source 和 merge_policy.reason。强制合入只改变后续合入策略，不得篡改真实 arkweb_impact 结论。
            6. 基于 arkweb-security-patch-impact skill 的责任田规则判定责任田，团队名必须来自配置中的合法团队名；
            7. 基于 arkweb-security-patch-impact skill 的特性树规则输出影响特性，必须复制配置中的完整特性路径；
            8. 输出稳定性、安全性、性能、兼容性、业务逻辑正确性、RAM、ROM、风险等级、是否建议保留、是否需要测试与测试建议；
            9. 如果 issue 属于安全相关（例如含 CVE、安全标签、漏洞类型、可利用性、权限绕过、内存破坏、沙箱逃逸、XSS、URL/证书/隐私/权限等线索），必须单独重点分析安全影响：
               - 漏洞类别、攻击面、触发条件、可利用性、影响资产或权限边界；
               - ArkWeb 是否暴露对应入口、是否被平台裁剪、沙箱/站点隔离/权限/证书/隐私能力是否相关；
               - 不修复时的安全后果、受影响场景、风险等级依据、是否需要安全专项测试；
               - 如判定 unaffected，也必须给出安全链路不可达或代码不存在的证据。
            10. affected 时列出后续人工合入建议和风险点；若 forceMerge=true，即使真实结论为 unaffected 或 unknown，也必须说明“按用户强制合入策略继续合入”，并把真实影响证据和强制策略分开记录；
            11. unaffected 或 unknown 时列出证据、缺口和后续核查建议。

            本状态只做影响判定并产出 03 阶段结论；自动合入、编译验证和提交上库由后续状态继续执行。
            可优先执行 skill 内置脚本生成 03 阶段初稿，不要实时生成临时影响判定脚本：
              python3 skills/arkweb-security-patch-impact/scripts/generate_impact_decision.py --project-root <context.codebase> --output-root <context.projectRoot>/.ace-outputs/{runId} --feature-tree skills/arkweb-security-patch-impact/references/feature_tree_list.txt --impact-mode <根据需求描述“是否强制合入”解析为 normal|force_affected>
            脚本输出后仍必须人工复核版本分支、源码语义、安全专项影响和 merge_policy；如果页面需求描述写“是否强制合入：是/否”，必须以需求描述为准修正 03_impact_decision.json。

            阶段边界：
            - 本阶段先给出 Chromium 上游影响版本范围和依据，再结合 context.codebase 的当前工程源码给出 ArkWeb 影响结论；
            - 本阶段负责 ArkWeb 影响结论、五性/RAM/ROM、责任田、特性树、风险级别、保留建议和测试建议；
            - 不负责重新抓取 patch 或重写修改文件列表。
          role: defender
          skills:
            - arkweb-security-patch-impact
        - name: 影响判定裁决
          agent: arkweb-security-patch-judge
          task: |
            审核各 issue 目录中的《03_impact_decision.md》是否足以归档。

            裁决规则：
            1. 影响结论为 affected、unaffected 或 unknown 且证据链清楚时，进入「分析归档」；
            2. 影响分析还可继续补充时，给 conditional_pass 并回到「影响判定」；
            3. 分析过程不可用或证据严重矛盾时，给 fail 并仍进入「分析归档」记录失败原因。

            在回复末尾输出 JSON：
            ```json
            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "分析归档|影响判定",
              "issues": [
                {
                  "type": "security|implementation|design",
                  "severity": "critical|major|minor",
                  "description": "..."
                }
              ],
              "summary": "一句话总结"
            }
            ```
          role: judge
          skills:
            - arkweb-security-patch-judge
      transitions:
        - to: 分析归档
          condition:
            verdict: pass
          priority: 1
          label: 影响结论可分析归档
        - to: 影响判定
          condition:
            verdict: conditional_pass
          priority: 2
          label: 继续补充影响判断
        - to: 分析归档
          condition:
            verdict: fail
          priority: 3
          label: 影响判断失败，分析归档原因
      position:
        x: 920
        y: 160
      isInitial: false
      isFinal: false
      maxSelfTransitions: 3
    - name: 分析归档
      description: 归档本地 issue 解析、patch 获取和影响判定结果，并把当前 run 归档交给后续自动合入
      type: normal
      requireHumanApproval: false
      steps:
        - name: 生成归档报告
          agent: arkweb-security-patch-report-writer
          task: |
            汇总本次运行的本地 issue 解析、patch 获取和影响判定阶段，为每个 issue 输出《ArkWeb本地Issue补丁分析归档报告》，并写入对应 issue 目录：
            .ace-outputs/{runId}/{issue_id}/04_final_archive.md 和 .ace-outputs/{runId}/{issue_id}/04_final_archive.json。

            报告至少包含：
            1. 本地 issue 归档目录、实际处理的 HTML/MHTML 文件清单、issue id 与标题；
            2. 解析出的漏洞/缺陷摘要、里程碑、标签、状态和可信度；
            3. 自动获取或定位到的 patch 列表，包括 URL、commit、Change-Id、patch 路径或获取命令；
            4. 影响判定结论 affected/unaffected/unknown、证据链和风险；安全相关 issue 必须包含安全专项影响摘要；必须保留 merge_policy.force_merge/impact_mode/reason，区分真实影响结论和用户强制合入策略；
            5. 责任田、影响特性、五性/RAM/ROM、是否建议保留、是否需要测试；
            6. 未解决问题、人工核查建议、后续工作建议；本阶段只记录分析归档结果；自动合入、编译验证、提交上库由后续状态继续执行，不得在本阶段写成最终失败结论；
            7. 确保按每个 issue 一个文件夹归档，{issue_id} 是阶段产物和 patch 的唯一主目录：
               .ace-outputs/{runId}/{issue_id}/01_issue_analysis.md
               .ace-outputs/{runId}/{issue_id}/01_issue_analysis.json
               .ace-outputs/{runId}/{issue_id}/02_patch_fetch.md
               .ace-outputs/{runId}/{issue_id}/02_patch_fetch.json
               .ace-outputs/{runId}/{issue_id}/03_impact_decision.md
               .ace-outputs/{runId}/{issue_id}/03_impact_decision.json
               .ace-outputs/{runId}/{issue_id}/patches/
               .ace-outputs/{runId}/{issue_id}/04_final_archive.md
               .ace-outputs/{runId}/{issue_id}/04_final_archive.json
               .ace-outputs/{runId}/{issue_id}/summary.md
               .ace-outputs/{runId}/{issue_id}/summary.json
            8. .ace-outputs/{runId}/ 根目录不得写任何文件；只能包含以 issue id 命名的目录。
               不得生成根级 04_final_archive.md/json、*.index.md/json、patches/ 或 01/02/03 主产物。
            9. 附一个 JSON 摘要块，字段至少包含：
            {
              "archive_result": "success|partial|failed",
              "issue_archive_dir": "<issue_archive_dir>",
              "processed_issue_files": [],
              "patches_found": [],
              "impact": "affected|unaffected|unknown",
              "merge_policy": {
                "force_merge": false,
                "impact_mode": "normal|force_affected",
                "reason": ""
              },
              "archive_dirs": [],
              "missing_artifacts": [],
              "report_path": ".ace-outputs/{runId}/{issue_id}/04_final_archive.md"
            }

            阶段边界：
            - 本阶段只汇总和复制归档，不重新生成漏洞事实、patch 文件列表或影响结论；
