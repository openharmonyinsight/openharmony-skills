            审核《11_risk_assessment.md》。


            裁决规则：

            1. 给定 patch 已真实合入，且本地编译通过，或编译命令完整退出后失败已证明与本次 patch
            无关并记录为非阻塞编译风险时，必须进入「提交上库」；

            2. 风险、未知项、人工跟踪项或非当前步骤事项不得作为 fail 原因；

            3. 编译进程中断、超时、无真实退出码、重跑仍未完成、build_completed=false 或 submit_eligible=false 时，必须进入「结果归档」，不得把它作为非阻塞风险提交上库；

            4. 只有某个 issue 的前序产物证明给定 patch 未真实合入，或与本次 patch
            相关的编译失败却被误报通过/无关，才允许将该 issue 标记 terminal_failed 并归档前序不可信证据；只有当前阶段
            pending 清零且仍有 ready_for_next issue
            时，整体才进入「提交上库」，不得回到「自动合入」或「编译验证」形成循环。


            在回复末尾输出 JSON：

            ```json

            {
              "verdict": "pass|conditional_pass|fail",
              "next_state": "提交上库|结果归档",
              "issues": [
                {
                  "type": "security|performance|implementation|design",
                  "severity": "critical|major|minor",
                  "description": "..."
                }
              ],
              "summary": "一句话总结"
            }

            ```
          role: judge
          skills:
            - arkweb-security-patch-judge
