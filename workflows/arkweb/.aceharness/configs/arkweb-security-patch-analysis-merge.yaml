      type: normal
      requireHumanApproval: false
      steps:
        - name: 提交并上库
          agent: arkweb-security-patch-submitter
          task: |
            严格使用 arkweb-security-patch-gitcode-pr skill 完成 ArkWeb Chromium 补丁上库。必须读取 03_impact_decision.json / 04_final_archive.json / 06_merge_result.json 中的 merge_policy.force_merge；forceMerge=true 时，提交说明必须如实写明“真实影响结论为 affected/unaffected/unknown，按用户强制合入策略继续提交”，但不得把 unaffected/unknown 当作阻塞门槛。 基于当前工作树状态和前序报告识别本次 patch 实际涉及的文件，只暂存这些文件。 单 issue 模式创建一个规范提交，推送到个人 fork 分支，然后按《06_merge_result.md》记录的 manifest project / remote 推导上游仓，并按 context.automation.gitcode.targetBranch 创建 GitCode PR。 批量模式必须读取 .ace-outputs/{runId}/00_batch_plan.json、batch_status.json 和 issues/{issue_id}/06_merge_result.md，按 issue 串行提交；每一个 Chromium issue 必须对应一个 GitCode Issue、 一个 git commit、一个独立 fork 分支和一个 GitCode PR，禁止把多个 issue 合成一个 commit 或一个 PR。提交队列只能来自 batch_status.json 中当前阶段可提交的 ready_for_next active issue；terminal_failed、deferred_for_archive、pending_current_stage、未通过风险评估或未满足编译门槛的 issue 不得创建 GitCode Issue、commit、分支或 PR。 批量模式提交使用当前工程目标子仓中已经合入的总 diff， 提交阶段再按 issue 的 modified_files[]/final_changed_files 拆分暂存和提交；不得创建或依赖 git worktree， 不得把前一个 issue 的提交内容带入后一个 issue。 GitCode Issue、commit message、PR title/body 必须只总结当前 issue 的漏洞、影响判定、合入、编译和风险信息； 不得把 00_batch_plan、batch_status 或其它 issue 的批量汇总、批量统计、其它 PR/commit 状态带入当前 issue 的 GitCode Issue、commit message 或 PR body。批量信息只能写入本地根目录 12_submit_result.md 和最终批量报告。 将结果写入 .ace-outputs/{runId}/12_submit_result.md。 批量模式还必须为每个 issue 写入 .ace-outputs/{runId}/issues/{issue_id}/12_submit_result.md， 并在根目录 12_submit_result.md 中输出汇总表。根目录 12_submit_result.md 必须区分 submitted、submit_failed、not_submitted_deferred、not_submitted_terminal 和 not_submitted_pending，不能把未进入提交队列的 issue 当作提交失败。 commit message 必须读取输入 issue 归档目录中的 04_final_archive.md，并把其中的 issue、patch、影响判定事实 作为漏洞背景；自动合入、编译验证、风险评估和提交状态必须来自当前工作流的 06_merge_result.md、 09_build_verification.md、11_risk_assessment.md 和 12_submit_result.md，不能把归档阶段未执行的占位结论当成本流程事实。 不能只写摘要。如果 04_final_archive.md 不存在，必须停止提交并写入阻塞项。 提交正文必须过滤归档阶段的“未解决问题与人工建议/人工核查建议/后续合入建议”章节，尤其不能带入 “自动合入、编译验证、提交上库（均未执行）”这类前置归档阶段的占位或过期判断；提交结果以本工作流实际执行的 自动合入、编译验证和上库步骤为准。 提交仓库路径必须从顶层 workflow context 传递：优先使用 context.automation.gitcode.repoPath， 其次使用 context.automation.repoPath 或 context.codebase；如果传入的是 ArkWeb wrapper 根目录， 只能自动推导到其 src 子仓，不能写死个人路径。
            提交范围硬性限制：只允许提交本次 patch 实际修改文件。其它无关脏改、未跟踪文件、SDK、toolchain、构建产物、src/out、 .ace-outputs、临时 patch 文件和历史遗留删除必须全部忽略，不得暂存、不得提交、不得清理。 批量模式中，每个 issue 提交前必须根据该 issue 的 modified_files[]、06_merge_result.md 最终变更文件列表、以及编译修复登记的 local_adaptations[]/compile_fix_files[] 计算 本 issue 允许暂存文件；每个 issue 提交前必须先确保暂存区为空，只允许 `git add -- <当前issue文件...>`， 禁止暂存其它 issue 文件。若多个 issue 修改同一文件，自动合入阶段应已按 issue_id 数值升序只保留最小 issue_id 作为 winner 进入 active batch，其它 issue 标记为 duplicate_files/overlap 并排除出无重复 active batch；提交阶段再次发现重叠文件时，必须停止对应 issue，不得把重叠文件合并提交到错误 issue。 推送前必须执行提交体积预检：确认 `git diff --cached --name-status`、`git diff --cached --stat`、暂存文件大小、 新增/修改文件列表和待推送 commit 范围只包含本次 patch 文件。待推送 commit 范围必须以 manifest/upstream remote 的目标分支为基线，例如 `tpc/master..HEAD`；个人 fork remote 只作为 push 目的地，不得用 `personal/master..HEAD` 作为整批最小提交范围判定。如果 `personal/master..HEAD` 很大但 manifest/upstream range 很小且暂存区只包含当前 issue 白名单文件，不得把 ready issue 标记为 submit_failed。如果个人 fork 默认分支与 manifest/upstream baseline 无 merge-base，或 fork range 显示会推送大量历史，必须先用 GitCode API/`oh-gc branch create` 在个人 fork 创建一个指向 manifest/upstream baseline SHA 的临时基线分支，再 push issue 分支；不得直接尝试推送包含上游历史的大 pack。批量工作树已包含多个 issue 的未提交总 diff，或当前 HEAD 已有其它 issue 提交时，必须使用 arkweb-security-patch-gitcode-pr skill 内的 `create_isolated_issue_commit.mjs` 从 manifest/upstream baseline 和当前 issue 白名单文件构造独立 commit；不得在污染分支上直接 `git commit`，不得切换/清理当前工作树，不得使用 git worktree。若发现大文件、构建产物、SDK/toolchain、压缩包、 src/out 或范围外文件，必须取消暂存/停止提交，并写入阻塞项，不能继续 push。 如果 `git push` 返回 HTTP 413 或远端拒绝过大 pack，必须判定为提交范围或对象体积问题：禁止重复盲推， 必须输出 pack 过大的可能文件、已暂存文件、待推送 commit 列表，以及下一步最小修复建议（拆分提交、去除范围外文件、 重新基于干净分支只应用或移植本次 patch 文件）。如果 `git push` 被 Git LFS pre-push hook 报 `Unable to find source for object ...`，必须先判断当前 issue submit scope 是否包含 LFS 跟踪文件；若本 issue 不修改 LFS 跟踪文件，必须立即对同一 fork 分支使用 `GIT_LFS_SKIP_PUSH=1 git push ...` 重试一次，并记录首次失败和重试结果，不得直接把整批标记为 submit_failed；若本 issue 修改了 LFS 跟踪文件，才允许要求补齐 LFS 对象后再推送。不得通过清理其它脏改或强推来规避。 批量模式必须逐 issue 推进；单个 issue push、GitCode Issue 或 PR 失败时，只能标记该 issue `submit_failed` 并继续后续 ready issue，不得把剩余 ready issue 直接改成 pending 或整批停止；只有认证失效、网络不可达、配置缺失等共享基础设施问题才允许停止整批。如果 fork 分支已经存在且指向本 issue isolated commit，必须跳过重复 push，继续创建或复用 GitCode Issue，再创建 PR 与 `start build` 评论。 批量恢复提交前必须先做远端幂等扫描：按 issue id 查询已有 fork 分支和已有 open PR；如果该 issue 已存在 open PR，必须复用该 PR 并标记 submitted，不得再创建新 commit、新分支、新 GitCode Issue 或新 PR。如果已有 fork 分支但 PR 缺失，只允许复用该分支继续创建 PR；不得为同一 issue 再创建第二个分支，除非原分支 commit 与当前 issue scope 明确不一致并在结果文件中记录废弃原因。 使用 `create_isolated_issue_commit.mjs` 时，当前工作树范围外脏改、未跟踪文件、SDK/toolchain 删除或构建产物只作为 ignored_worktree_state 记录，不得阻塞当前 issue 提交；真正的提交对象只能由 submit scope 白名单文件和 manifest/upstream baseline 构造，只有 submit scope 本身包含禁用路径时才阻塞。
            必须记录： 1. commit id、subject、关联 issue / CVE / bug / Change-Id，以及 commit message 已按规则引用 04_final_archive.md
               并过滤人工建议/未执行占位章节的确认；
            2. 实际 git add 的文件列表，禁止全量提交无关脏改； 3. fork remote、fork 分支、manifest project、manifest remote、实际目标仓库、实际目标分支； 4. 推送前的暂存区 diff、文件体积预检和待推送 commit 范围； 5. GitCode PR 链接或创建失败原因； 6. 若上库失败，给出明确失败原因和后续操作建议；HTTP 413 必须按过大 pack 问题记录。 7. 批量模式必须记录每个 issue 的 GitCode Issue 编号、commit、fork 分支、PR 链接、start build 评论结果和最终状态。 批量提交阶段不得临时生成大段 shell/Python/Node 上库脚本；必须调用 arkweb-security-patch-gitcode-pr skill 的 scripts。 push 前必须先调用 `scan_existing_submit_targets.mjs` 对整个 ready 队列做远端幂等扫描，并把扫描结果作为 `12_submit_result.md` 的证据。若同一 Chromium issue 已有 open PR，必须复用该 PR 并标记 submitted，不得重新生成 commit、分支、GitCode Issue 或 PR。若同名 fork 分支已存在但 commit 与本次 isolated commit 不一致，且没有可复用 open PR，必须标记 `submit_failed(branch_exists_commit_mismatch)`，记录远端 SHA 与本地 commit，禁止自动创建 `-r2/-r3` 分支、禁止强推、禁止重复盲推。
            在回复末尾输出 JSON： ```json {
