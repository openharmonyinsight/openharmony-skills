context:
  projectRoot: <workflow_output_root>
  workspaceMode: in-place
  requirements: >-
    本工作流用于根据目录中规定的本地 issue HTML/MHTML 文件解析 issue，自动获取修复 patch，判断 ArkWeb 影响，并在同一次
    run 中继续执行自动合入、编译验证、提交上库和最终归档。


    默认输入：

    1. 本地 issue 归档目录:<issue_archive_dir>

    2. ArkWeb 工程根目录:<arkweb_project_root>
       真实源码根目录使用 context.codebase；context.projectRoot 只用于工作流输出和轻量运行上下文，避免 ACEHarness 启动时对 ArkWeb 大仓建立 Git 基线。

    3. 支持 issue 文件类型：*.html、*.htm、*.mhtml、*.mht；如果存在 issue.zip，可作为同源归档参考

    4. patch 获取优先级：漏洞解析阶段确认的 Gerrit CL / Gitiles commit / Chromium review / PR /
    patch 下载地址

    5. 若网络不可用，必须输出可复现获取命令和阻塞原因

    6. 是否强制合入：是。该字段是 Web 页面可编辑的主开关；写“是”表示不管影响判定为 affected、unaffected 还是
    unknown，都继续执行自动合入、编译验证和提交上库；写“否”表示不启用强制合入。影响判定阶段仍必须如实记录真实 arkweb_impact
    和证据链，后续阶段只能把强制合入作为用户策略记录，不能篡改影响结论。


    集成执行规则：

    - 漏洞解析、Patch抓取、影响判定和分析归档产物写入
    <context.projectRoot>/.ace-outputs/{runId}/{issue_id}/；源码核验、合入、编译和提交使用
    context.codebase。

    - 自动合入默认消费当前 run 的分析归档目录
    <context.projectRoot>/.ace-outputs/{runId}，不需要用户手工复制目录。

    - 若 requirements 明确指定已有单 issue 归档目录或批量 run 归档目录，可跳过前序输入发现并使用该目录作为外部归档输入。

    - 自动合入、编译验证、提交上库和最终归档产物继续写入同一个 <context.projectRoot>/.ace-outputs/{runId}。

    - 不修改本地 issue 原始归档文件；不创建 git worktree；合入范围只限 patch 和前序产物明确允许的文件。
  codebase: <arkweb_project_root>
  timeoutMinutes: 240
  engine: codex
  executionPolicy:
    defaultEngine: codex
    autoCompactOnStepChange: false
    agentOverrides: {}
  skills: []
  mcpServers: []
