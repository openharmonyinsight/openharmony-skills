      steps:
        - name: 解决合入冲突
          agent: arkweb-security-patch-conflict-resolver
          task: |
            基于《06_merge_result.md》执行冲突解决；本工作流里的“冲突解决”就是 git apply 失败或上下文漂移后，在允许文件范围内做最小等价手工写入。批量模式下必须逐个 issue 读取 .ace-outputs/{runId}/issues/{issue_id}/06_merge_result.md，只处理该 issue 的冲突和允许文件范围，并在当前工程目标子仓中解决冲突，不得创建或切换到 git worktree。结果写入 .ace-outputs/{runId}/issues/{issue_id}/07_conflict_resolution.md， 同时更新 batch_status.md/json。 冲突解决/最小手工写入范围硬性限制：只允许修改上游 patch 明确涉及的冲突文件，以及《06_merge_result.md》中明确列出的本次 patch 必需文件。工程中其它未提交代码、未跟踪文件、历史脏改、构建产物和无关删除一律视为外部状态，必须忽略， 不能清理、暂存、格式化或顺手修复。 批量模式必须优先读取 issue 级 06_merge_result.json 的 patch_normalization[]、modified_files[]、target_subrepo 和 blockers；如旧产物只有 normalized_patches，必须按 patch_normalization[] 兼容处理。对 patch does not apply、三方合并缺 blob、上下文漂移和空 diff，必须读取规范化 patch hunks 与当前目标文件，在 modified_files[] 范围内执行最小等价手工写入。若未执行手工写入，必须写明 manual_attempted=false 和 manual_skip_reason，不能只把 git apply 失败原样带到下一轮。手工写入成功就是成功，必须写回 manual_attempted=true、manual_applied=true、manual_rewrite=true、semantic_landed=true、最终变更文件、关键语义对应关系，并清除旧的 patch_apply_failed:*、no_real_file_change；旧 worktree_add_failed 不得作为当前轮阻塞。manual_attempted=true 但 manual_applied=false 时不得 ready_for_next。默认执行最小手工补丁；如果最小手工写入需要改动范围外文件才能继续，必须停止并输出阻塞项，不能自动扩大处理范围。 写入完成后必须检查按该 issue 允许文件过滤后的 `git diff --name-status -- <allowed files...>` 是否非空，确保真的产生了合入变更；如果没有变化，不能把结果写成 pass。 冲突解决后按 issue 分流：已真实合入的 issue 标记 ready_for_next 并等待本阶段统一出口，确认无法手工合入的 issue 标记 terminal_failed 并归档原因，其它仍可处理的 issue 标记 pending_current_stage；只要仍存在 pending_current_stage，ready_for_next issue 不能提前进入代码审查/编译验证。不得因为发生过冲突或手工改写降级裁决。 无进展保护：批量模式每轮必须记录本轮前后的 stage_status、blocker 和 final_diff 变化；如果某些 issue 没有 blocker 减少、manual_applied 状态变化或 issue 过滤 diff 变化，只能将这些 issue 标记为 no_progress/terminal_failed 或继续 pending_current_stage；若仍有 pending_current_stage，顶层 verdict 必须保持 conditional_pass 并继续本阶段；只有 pending 清零且仍有 ready_for_next issue 时，顶层 verdict 才能 pass 并统一进入下一阶段。
            需要输出： 1. apply 失败/冲突根因； 2. 最小手工写入方案； 3. 与上游 patch 的偏差说明； 4. 仍未解决的阻塞项； 5. 每个处理 issue 的 issue_id、target_subrepo、manual_attempted、manual_applied、semantic_landed、manual_skip_reason、final_diff_name_status 和最新 blockers。
            单 issue 模式将结果写入 .ace-outputs/{runId}/07_conflict_resolution.md；批量模式除总览外，还必须写入每个 issue 的 issues/{issue_id}/07_conflict_resolution.md。
