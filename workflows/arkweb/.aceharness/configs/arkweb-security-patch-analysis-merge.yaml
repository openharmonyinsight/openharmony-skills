            批量模式必须在当前工程的目标 git 子仓中直接合入，禁止创建或依赖 git worktree。ArkWeb 是多仓结构，自动合入前必须先确定目标 git 子仓，不能直接在 ArkWeb wrapper 根目录执行。 目标子仓由 selected_fix.project、modified_files[]、patch diff 路径和本地 .git 边界共同确定： chromium/src 或 chrome/content/components 等主树路径默认落到 context.codebase/src； v8 项目或 v8/ 路径落到 context.codebase/src/v8； arkweb 项目或 src/arkweb 内路径落到 context.codebase/src/arkweb。 目标子仓确定后，必须从 context.codebase/.repo/manifests 解析该 path 对应的 manifest project， 例如 src -> chromium_src、src/v8 -> chromium_v8、src/arkweb -> chromium_arkweb； GitCode 上库目标由 manifest remote fetch 和 project name 推导，不能要求用户手工改 upstreamRepo。 若无法唯一确定目标子仓，必须停止并写入阻塞项。
            批量合入规则： 1. 批量开始前必须基于 normalized patch 的 diff 路径和 02_patch_fetch.json.modified_files[] 统计全部 issue 的目标文件集合； 2. 若任意两个 issue 修改同一目标文件，必须在 00_batch_plan.md/json 标记 duplicate_files/overlap，并按 issue_id 数值升序为每个重复文件选择最小 issue_id 作为 winner；不同重复文件组必须分别选择 winner，例如 a/b/c 因文件1重复则选 a，d/e/f 因文件2重复则选 d，a 和 d 都进入 active batch；其它涉及该重复文件的 issue 标记为 deferred_for_archive/terminal_failed，退出 active batch，本轮不自动合入，最终在结果归档中说明遗留原因；active_batch 计算方式为“无重复文件 issue ∪ 所有重复文件组 winner - 所有重复文件组 loser”，如果某 issue 在任一重复文件组里是 loser，该 issue 整体不进入 active batch，不能半合入； 3. 只有确认 active batch 中不存在重复修改文件时，才允许把这些 issue 的 patch 全部合入当前工程目标子仓； 4. 合入按 issue 串行执行，但同一轮不创建 issue 独立工作树、不创建预提交、不切换到临时 worktree； 5. 每个 issue 必须记录自己的 patch_normalization、modified_files、final_changed_files、manual_attempted、manual_applied、semantic_landed、local_adaptations[] 和 apply/manual 结果，batch_status 记录 duplicate_files、overlap_winners、active_batch、deferred_for_archive、ready_for_next、pending_current_stage、terminal_failed。final_changed_files 必须按 issue 允许文件过滤，不能使用全局 git diff 污染每个 issue。

            长耗时等待规则：ArkWeb 是大仓，首次 git status/git diff、patch apply、冲突扫描和后续提交拆分都可能长时间运行。批量合入时只在当前工程目标子仓刷新一次工作树状态，并在全部非重叠 issue 合入后统一编译验证；自动合入补丁阶段不能因为几分钟没有输出就判定进程阻塞、死锁或失败。只有命令退出码非 0、出现明确错误文本、超过工作流显式超时，或通过 ps/文件时间/CPU-IO 状态确认长期无进展时，才允许判定异常。需要定位时只能先做只读检查并记录命令、PID、运行时长、issue id 和目标子仓路径，不得因为“看起来卡住”就 kill 进程、中断、重跑或跳过该 issue。

            在确定的 ArkWeb git 子仓中执行自动合入，优先使用规范化后的 patch 执行 git apply；发生冲突、上下文漂移或 patch does not apply 时，进入冲突解决阶段。此工作流里的“冲突解决”就是在 modified_files[] 允许范围内执行最小等价手工写入。输出合入过程、冲突点和结果到 .ace-outputs/{runId}/06_merge_result.md；批量模式还必须为每个 issue 输出 .ace-outputs/{runId}/issues/{issue_id}/06_merge_result.md，并维护 .ace-outputs/{runId}/batch_status.md/json。
            要求： 1. 记录输入归档目录、archiveRunId、issue_id、目标 git 子仓、manifest project、manifest remote、推导出的上游仓、git apply 工作目录、strip 参数、patch_files[]、modified_files[]、selected_fix； 2. 记录每个 patch 的格式识别、base64 解码、规范化路径、内容校验、执行命令和结果； 3. 保持最小侵入，避免顺手重构； 4. 若合入失败，准确标记冲突文件和根因； 5. 如果已成功合入，列出最终变更文件。 6. 如果 git apply 失败但属于可解冲突，必须进入冲突解决阶段执行最小手工写入，不要直接判停；手工补丁只能落在归档的 modified_files[] 范围内。对 patch does not apply、repository lacks the necessary blob to perform 3-way merge、上下文漂移等 apply 失败，必须先读取规范化 patch hunks 和当前目标文件，在 modified_files[] 范围内执行最小等价手工写入；手工修复成功即合入成功，必须写 manual_applied=true、semantic_landed=true 并清除当前合入 blocker；但 manual_attempted=true 只代表尝试过，不能作为成功条件。除非写明 manual_attempted=false 和不可手工处理的具体原因，否则不得最终判 fail。
               若必须修改范围外文件，必须停止并在《06_merge_result.md》中列为阻塞项，不能自行扩大变更范围。
            7. 如果某个 issue 执行后没有真实文件变更，或者按该 issue 允许文件过滤后的 `git diff --name-status -- <allowed files...>` / `git diff --cached --name-status -- <allowed files...>` 为空，只能判定该 issue 未合入成功并进入 pending_current_stage 或 terminal_failed，不能让其它已合入 issue 失败。 8. 批量模式中，每个 issue 必须记录独立的最终变更文件列表；若多个 issue 修改同一文件，必须在
               00_batch_plan.md/json 中标记 duplicate_files/overlap，并按 issue_id 数值升序选择最小 issue_id 作为该重复文件 winner 进入 active batch；其它涉及重复文件的 issue 标记为 deferred_for_archive/terminal_failed 并移出 active batch，本轮不自动合入、不进入冲突解决、不编译、不提交，最终在结果归档说明遗留原因。
            9. batch_status 和 issue 级 06_merge_result 只能保留最新一轮 blocker。某 patch 后续已手工落地后必须清除旧 patch_apply_failed:* 和 no_real_file_change；旧 worktree_add_failed 只作为历史失败记录，不得参与当前 in-place 合入裁决；不能把历史失败与最新状态混写。只有 `apply_ok=true`、`manual_applied=true` 或 `semantic_landed=true` 且 blockers 为空时，才允许 ready_for_next。
            10. 批量模式必须按阶段统一处理、阶段结束后按 issue 分流：本阶段内不能让已成功 issue 提前越过仍在本阶段处理的 issue；阶段内，ready_for_next issue 只表示本阶段已完成并等待统一出口，不能单独进入下一阶段；pending_current_stage issue 留在当前阶段继续处理；重复文件/overlap 的 winner issue 可进入 active batch，非 winner issue 标记 deferred_for_archive/terminal_failed 并从 active batch 剔除，只在结果归档说明遗留原因；terminal_failed issue 从 active batch 剔除并归档失败原因。只有当本阶段没有 pending_current_stage 后，状态机才把全部 ready_for_next issue 作为新的 active batch 一次性推进下一阶段。顶层 pass 表示本阶段无 pending_current_stage 且至少一个 ready_for_next issue 可随批次统一进入下一阶段；conditional_pass 只表示仍有 issue 需要留在当前阶段继续冲突解决或编译修复，此时 ready_for_next 必须等待；fail 仅表示没有任何 ready_for_next issue 可继续或存在整批不可恢复基础设施错误。个别 issue 因重复文件遗留、确实无法合入、无法手工解决、无法编译修复，不得阻塞 pending 清零后的统一推进。
