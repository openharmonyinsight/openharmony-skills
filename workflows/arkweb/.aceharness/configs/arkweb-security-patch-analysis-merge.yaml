            build_completed=false、build_status=interrupted|incomplete、retry_attempted=true|false，并在本步骤内重跑一次真实编译；重跑仍未完成时 verdict=fail、next_state=编译修复，不能 conditional_pass，也不能进入提交上库； 5. 如果某个
