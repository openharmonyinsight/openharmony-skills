schemaVersion: 1

id: ohos-design-arkts-api-review
title: 鸿蒙 ArkTS API 规范检视
summary: 检视鸿蒙 ArkTS API 接口设计是否符合命名、接口设计、同步异步、异常处理、类型数据、注释、事件命名、结构定义等 54 条规范性要求。

category:
  scope: common
  namespace: design
  stage: design
  domain: arkts
  capability: api-review

status:
  maturity: stable
  version: 1.0.0
  owner: openharmony

tags:
  - arkts
  - api
  - specification
  - review

audience:
  - ArkTS API 设计者
  - API 评审人员
  - 接口签名 Reviewer
  - 错误码与注释规范审查人员

useCases:
  - title: 评审新增 ArkTS API 接口设计
    description: 在 API 上库前对 .ts / .ets 文件中的接口声明进行命名、签名、参数、注释、错误码、同步异步选型等规范性检视。
  - title: 检视存量 API 规范一致性
    description: 扫描已有 ArkTS 接口，发现命名不一致、错误码非标、注释缺漏、空接口等问题。
  - title: 事件订阅 API 命名审查
    description: 校验 onXXX / offXXX / onceXXX / emit 等事件类方法的命名前缀和触发语义。

whenToUse:
  - 新增鸿蒙 ArkTS API 接口（.ts / .ets）需要规范性评审
  - API 命名审查、接口签名设计评审、参数设计检查
  - 注释规范审查、错误码设计评审、同步异步设计检查
  - 事件订阅 / 取消订阅 / 一次性订阅 / 触发方法的命名检视

whenNotToUse:
  - 检视 C / C++ 头文件接口（应使用 ohos-design-c-api-review）
  - 仅评审业务实现代码质量，不涉及 API 设计规范
  - 仅评审 ArkTS 代码静态规范（应使用 ohos-dev-arkts-static-specification-reference）

inputs:
  required:
    - 待检视的 ArkTS API 声明文件（.ts / .ets），含接口、类、枚举、方法、属性、注释
  optional:
    - 同文件或同模块已有存量 API 列表，用于风格一致性参考
    - 接口对应的错误码定义表
    - 接口预期的设备能力差异说明

outputs:
  - 按 API 声明逐一列出的违规项，标注命中规则名与所在行号
  - 每条违规的具体修改建议（命名替换、错误码取值、注释补充等）
  - 不应检出的合法写法说明（如 Disable / Hide / Close 等肯定表达）

quickStart:
  steps:
    - 提供待检视的 ArkTS API 文件路径或内容。
    - 说明是否需要参考同文件存量 API 风格。
    - 请求按 54 条规则逐一输出违规项与修改建议。
  examplePrompt: |
    请使用 ohos-design-arkts-api-review 检视这个 ArkTS 接口文件，按命名、
    接口设计、同步异步、异常、类型、注释、事件、结构定义八类规则逐一输出
    违规项与具体修改建议。

related:
  skills:
    - ohos-design-c-api-review
    - ohos-dev-arkts-static-specification-reference
  docs: []
